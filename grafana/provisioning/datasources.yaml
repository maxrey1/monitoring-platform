apiVersion: 1

datasources:

  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true

  - name: HyperDX
    uid: hyperdx
    type: grafana-postgresql-datasource
    access: proxy
    url: hyperdx-db:5432
    database: hyperdx
    user: hyperdx
    secureJsonData:
      password: hyperdx_password
    jsonData:
      sslmode: disable
    editable: true
