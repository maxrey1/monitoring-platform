global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:8888

  - job_name: zabbix
    static_configs:
      - targets:
          - zabbix-server:10051
